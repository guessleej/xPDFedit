# ════════════════════════════════════════════════════════════════════════════
#  xPDFedit — DGX Spark 生產 Nginx 設定
#  功能：反向代理、SSL 終止、速率限制、安全標頭
# ════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 日誌格式 ─────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ── 基本效能 ──────────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;

    # ── 壓縮 ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml;

    # ── 上傳大小（配合後端 MAX_UPLOAD_SIZE_MB）────────────────────────────────
    client_max_body_size        512m;
    client_body_buffer_size     128k;
    client_body_timeout         300s;
    client_header_timeout       30s;
    proxy_read_timeout          300s;
    proxy_connect_timeout       10s;
    proxy_send_timeout          300s;

    # ── 速率限制 ──────────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=upload:10m rate=10r/m;
    limit_req_zone  $binary_remote_addr  zone=auth:10m   rate=10r/m;
    limit_conn_zone $binary_remote_addr  zone=conn:10m;

    # ── 上游 ──────────────────────────────────────────────────────────────────
    upstream backend_pool {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend_pool {
        server frontend:80;
        keepalive 16;
    }

    # ── 快取設定 ──────────────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # ══════════════════════════════════════════════════════════════════════════
    #  HTTP → HTTPS 轉向（取消 SSL 後保留此區塊）
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 暫時關閉強制 HTTPS，如需啟用請取消下方兩行並刪除下面 HTTP server
        # return 301 https://$host$request_uri;

        # ── 健康檢查（供 Load Balancer 使用）──────────────────────────────
        location /health {
            access_log off;
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }

        include /etc/nginx/conf.d/locations.conf*;
    }

    # ══════════════════════════════════════════════════════════════════════════
    #  HTTPS（SSL 設定，需要憑證後取消整個 server 區塊）
    # ══════════════════════════════════════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     server_name your-dgx-hostname.example.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_dhparam         /etc/nginx/ssl/dhparam.pem;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #     ... (same location blocks as below)
    # }

    # ══════════════════════════════════════════════════════════════════════════
    #  主站（HTTP，測試環境 / 內網使用）
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;

        # ── 安全標頭 ──────────────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"  always;
        add_header X-Content-Type-Options    "nosniff"     always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
            always;

        limit_conn conn 50;

        # ── 健康檢查 ──────────────────────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_buffering    off;
        }

        # ── API 文件（Swagger / ReDoc）────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── 上傳端點（獨立速率限制 + 大超時）────────────────────────────────
        location ~ ^/api/v1/tools/.+/submit$ {
            limit_req zone=upload burst=5 nodelay;

            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
            client_max_body_size  512m;
        }

        # ── 認證端點（嚴格限速）──────────────────────────────────────────────
        location = /api/v1/auth/login {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── 下載端點（不快取）────────────────────────────────────────────────
        location ~ ^/api/v1/jobs/.+/download$ {
            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;

            proxy_buffering    off;
            proxy_read_timeout 120s;
        }

        # ── 前端 SPA ──────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;

            # SPA fallback: 404 → index.html
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://frontend_pool;
            proxy_set_header Host $host;
        }

        # ── 靜態資產快取（由前端容器服務）───────────────────────────────────
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            proxy_pass http://frontend_pool;
            proxy_cache         static_cache;
            proxy_cache_valid   200 7d;
            proxy_cache_use_stale error timeout updating;
            add_header          Cache-Control "public, max-age=604800, immutable";
            add_header          X-Cache-Status $upstream_cache_status;
        }

        # ── 禁止存取隱藏路徑 ─────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
