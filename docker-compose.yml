version: "3.9"

# xPDFedit 完整部署（含所有依賴服務）
# 快速啟動：docker compose up -d

services:

  # ── 後端 API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xpdfedit-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/xpdfedit.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-min-32-chars-long}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - DEBUG=${DEBUG:-false}
      - STORAGE_BACKEND=local
      - STORAGE_LOCAL_PATH=/app/data/storage
      - MAX_UPLOAD_SIZE_MB=200
      - ALLOWED_ORIGINS=["http://localhost", "http://localhost:3000", "http://localhost:80"]
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 前端 SPA ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xpdfedit-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx 反向代理 API 閘道 ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: xpdfedit-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s

volumes:
  backend_data:

networks:
  default:
    name: xpdfedit
