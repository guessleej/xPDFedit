# xCloudPDF API 閘道路由設定

upstream auth_service      { server auth:8001; }
upstream document_service  { server document:8002; }
upstream job_service       { server job-api:8003; }
upstream audit_service     { server audit:8004; }
upstream admin_service     { server admin:8005; }
upstream ai_service        { server ai:8006; }
upstream notify_service    { server notify:8007; }
upstream frontend          { server frontend:3000; }

# 限流設定
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

server {
    listen 80;
    server_name _;

    # 安全 Headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # 請求大小限制（文件上傳 200MB）
    client_max_body_size 200m;

    # ── 認證 ──────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── 文件處理 ──────────────────────────────
    location /api/v1/documents/ {
        limit_req zone=api_limit burst=50;
        auth_request /internal/auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_roles $upstream_http_x_user_roles;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        proxy_pass http://document_service/documents/;
        proxy_read_timeout 300s;  # 大檔案上傳
    }

    # ── 工具執行 ──────────────────────────────
    location /api/v1/tools/ {
        limit_req zone=api_limit burst=30;
        auth_request /internal/auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_roles $upstream_http_x_user_roles;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        proxy_pass http://document_service/tools/;
        proxy_read_timeout 60s;
    }

    # ── 作業管理 ──────────────────────────────
    location /api/v1/jobs/ {
        limit_req zone=api_limit burst=50;
        auth_request /internal/auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-ID $user_id;
        proxy_pass http://job_service/jobs/;
    }

    # ── 稽核 ──────────────────────────────────
    location /api/v1/audit/ {
        limit_req zone=api_limit burst=20;
        auth_request /internal/auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_roles $upstream_http_x_user_roles;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        proxy_pass http://audit_service/audit/;
    }

    # ── 管理後台 ──────────────────────────────
    location /api/v1/admin/ {
        limit_req zone=api_limit burst=20;
        auth_request /internal/auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_roles $upstream_http_x_user_roles;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        proxy_pass http://admin_service/admin/;
    }

    # ── AI 服務 ───────────────────────────────
    location /api/v1/ai/ {
        limit_req zone=api_limit burst=10;
        auth_request /internal/auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-ID $user_id;
        proxy_pass http://ai_service/ai/;
        proxy_read_timeout 300s;  # AI 推論較慢
    }

    # ── 內部 Auth 驗證端點 ────────────────────
    location = /internal/auth/verify {
        internal;
        proxy_pass http://auth_service/internal/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-URI $request_uri;
    }

    # ── 前端 SPA ──────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 健康檢查
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
