<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8152F"/>
      <stop offset="1" stop-color="#8A0D22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- PDF Document (white) -->
  <rect x="6" y="4" width="15" height="20" rx="2" fill="white" fill-opacity="0.97"/>

  <!-- Folded corner -->
  <path d="M16 4 L21 9 L16 9 Z" fill="#C41230" fill-opacity="0.3"/>

  <!-- Document lines -->
  <rect x="8.5" y="12.5" width="7.5" height="1.5" rx="0.75" fill="#C41230" fill-opacity="0.38"/>
  <rect x="8.5" y="15.5" width="10"  height="1.5" rx="0.75" fill="#C41230" fill-opacity="0.38"/>
  <rect x="8.5" y="18.5" width="6.5" height="1.5" rx="0.75" fill="#C41230" fill-opacity="0.38"/>

  <!-- Edit badge (orange circle) -->
  <circle cx="23" cy="23" r="8.5" fill="#FF6B2B"/>
  <circle cx="21" cy="20.5" r="3" fill="white" fill-opacity="0.12"/>

  <!-- Pencil icon (rotated -45deg) -->
  <g transform="translate(23,23) rotate(-45)">
    <rect x="-1.6" y="-5.8" width="3.2" height="1.9" rx="0.7"
          fill="white" fill-opacity="0.5"/>
    <rect x="-1.6" y="-3.9" width="3.2" height="6.4" rx="0.9" fill="white"/>
    <path d="M-1.6 2.5 L0 5.3 L1.6 2.5 Z" fill="white" fill-opacity="0.92"/>
  </g>
</svg>
